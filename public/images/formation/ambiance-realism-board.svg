    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#171526"/><stop offset=".5" stop-color="#0d1c26"/><stop offset="1" stop-color="#060b11"/></linearGradient>
    <linearGradient id="floor" x1="0" x2="1"><stop stop-color="#111721"/><stop offset=".55" stop-color="#15323b"/><stop offset="1" stop-color="#241526"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
    <pattern id="rain" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(14)"><path d="M2 0v18" stroke="#d7edf0" stroke-opacity=".13" stroke-width="2"/></pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/><path d="M0 86h410l170 514H0z" fill="#070a10"/><path d="M1200 35H845L700 600h500z" fill="#10151e"/>
