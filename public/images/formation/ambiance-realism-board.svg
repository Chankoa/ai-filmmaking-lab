  <text x="72" y="510" fill="#eef4f5" font-family="Arial, sans-serif" font-size="35" font-weight="700">AMBIANCE · RÉALISME · TEXTURE</text>
  <text x="74" y="548" fill="#8eb0b7" font-family="Arial, sans-serif" font-size="19">air · matière · imperfections · lumière · profondeur · mouvement</text>
